<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpaca Image Generator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico?v=2" />
  </head>
  <body>
    <h1>ALPACA GENERATOR</h1>
    <div class="container">
      <div class="preview">
        <div id="alpaca">
          <img id="background" src="assets/backgrounds/blue50.png" />
          <img id="neck" src="assets/neck/default.png" />
          <img id="hair" src="assets/hair/default.png" />
          <img id="eye" src="assets/eyes/default.png" />
          <img id="ear" src="assets/ears/default.png" />
          <img id="nose" src="assets/nose.png" />
          <img id="mouth" src="assets/mouth/default.png" />
          <img id="leg" src="assets/leg/default.png" />
          <img id="accessory" src="assets/accessories/headphone.png" />
        </div>
        <div class="actions">
          <button type="button" onclick="randomizeAlpaca()">Random</button>
          <button type="button" onclick="downloadAlpaca()">Download</button>
        </div>
      </div>

      <div id="controls">
        <h3>ACCESSORIZE THE ALPACA'S</h3>
        <div id="accessories" class="accessories">
          <button onclick="changeHair()">Hair</button>
          <button onclick="changeEars()">Ears</button>
          <button onclick="changeEyes()">Eyes</button>
          <button onclick="changeMouth()">Mouth</button>
          <button onclick="changeNeck()">Neck</button>
          <button onclick="changeLeg()">Leg</button>
          <button onclick="changeAccessory()">Accessories</button>
          <button onclick="changeBackground()">Background</button>
        </div>
        <h3>STYLE</h3>
        <div id="style" class="style">
          <p>Select a category above to view available styles.</p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
